<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIXUVIK - 📚 المكتبة الذكية</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { 'cairo': ['Cairo', 'sans-serif'] },
          colors: {
            ytDark: '#0f0f0f',
            ytDarkCard: '#212121',
            ytDarkHover: '#383838',
            ytAccent: '#00e5ff',
          }
        }
      }
    }
  </script>

  <!-- PDF.js library for thumbnail generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  
  <style>
    body { font-family: 'Cairo', sans-serif; transition: background-color 0.3s, color 0.3s; }
    
    /* Book Card Aspect Ratio 2:3 (Vertical like real books, NOT horizontal like YT videos) */
    .book-thumbnail {
      aspect-ratio: 2 / 3;
      object-fit: cover;
      width: 100%;
      border-radius: 12px;
    }

    .book-card {
      transition: transform 0.2s;
      cursor: pointer;
    }
    .book-card:hover {
      transform: scale(1.02);
    }
    
    /* Toast Notification */
    #toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: #ff4757; color: white; padding: 12px 24px;
      border-radius: 8px; font-weight: bold; z-index: 9999;
      transition: top 0.4s ease-in-out;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    #toast.show { top: 20px; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #888; }
    
    /* Hidden file input */
    #fileInput { display: none; }
  </style>
</head>

<!-- Body matches YT Dark Theme by default -->
<body class="bg-gray-50 text-black dark:bg-ytDark dark:text-white flex h-screen overflow-hidden">

  <!-- Toast for offline fallback warning -->
  <div id="toast">⚠️ الخادم غير متصل. سيتم حفظ الكتب في متصفحك.</div>

  <!-- Sidebar (Left side since it's RTL) -->
  <aside class="w-64 flex-shrink-0 h-full overflow-y-auto border-l border-gray-200 dark:border-gray-800 p-4 hidden md:block">
    <div class="mb-8 px-2 flex items-center gap-3">
      <div class="text-2xl">📚</div>
      <h1 class="text-xl font-extrabold tracking-tight">NIXUVIK</h1>
    </div>

    <nav class="space-y-2">
      <button onclick="switchTab('home')" id="btn-home" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg bg-gray-200 dark:bg-ytDarkHover text-black dark:text-white font-semibold transition">
        <span class="text-xl">🏠</span>
        <span>الرئيسية</span>
      </button>

      <button onclick="switchTab('myLibrary')" id="btn-library" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-ytDarkHover text-gray-700 dark:text-gray-300 font-semibold transition">
        <span class="text-xl">📖</span>
        <span>مكتبتي</span>
      </button>
    </nav>
    
    <div class="mt-auto pt-8 border-t border-gray-200 dark:border-gray-800 absolute bottom-4 w-56">
      <div id="connStatus" class="text-sm font-semibold flex items-center gap-2 text-green-500">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        متصل بالخادم
      </div>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col h-full relative">
    
    <!-- Topbar -->
    <header class="h-16 flex items-center justify-between px-6 border-b border-gray-200 dark:border-gray-800 shrink-0">
      
      <!-- Mobile Logo -->
      <div class="md:hidden flex items-center gap-2">
        <div class="text-xl">📚</div>
        <h1 class="font-extrabold">NIXUVIK</h1>
      </div>

      <!-- Search (Visual Only) -->
      <div class="flex-1 max-w-xl mx-4 hidden sm:block">
        <div class="flex relative">
          <input type="text" placeholder="بحث عن كتاب..." class="w-full bg-gray-100 dark:bg-ytDarkCard border border-gray-300 dark:border-gray-700 rounded-l-full px-5 py-2 focus:outline-none focus:border-blue-500 dark:focus:border-blue-400">
          <button class="bg-gray-200 dark:bg-ytDarkHover border border-gray-300 dark:border-gray-700 border-r-0 rounded-r-full px-6 py-2">
            🔍
          </button>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-4">
        <!-- Upload Button -->
        <button onclick="document.getElementById('fileInput').click()" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 dark:bg-ytDarkCard dark:hover:bg-ytDarkHover px-4 py-2 rounded-full font-semibold transition">
          <span>➕</span>
          <span class="hidden sm:inline">رفع كتاب</span>
        </button>
        <input type="file" id="fileInput" accept=".pdf" onchange="handleFileUpload(event)">

        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-ytDarkCard flex items-center justify-center text-xl hover:bg-gray-300 dark:hover:bg-ytDarkHover transition">
          🌗
        </button>
      </div>
    </header>

    <!-- Pages Container -->
    <div class="flex-1 overflow-y-auto p-6">
      
      <!-- Loading Bar (Hidden) -->
      <div id="loadingBox" class="hidden mb-6 bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 p-4 rounded-lg font-bold flex items-center gap-3">
        <div class="animate-spin text-xl">⏳</div>
        <span id="loadingText">جاري استخراج الغلاف والرفع...</span>
      </div>

      <!-- HOME TAB -->
      <div id="tab-home" class="block">
        <h2 class="text-2xl font-bold mb-6">المضافة حديثاً</h2>
        
        <!-- Books Grid -->
        <div id="homeBooksGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- MY LIBRARY TAB -->
      <div id="tab-myLibrary" class="hidden">
        <h2 class="text-2xl font-bold mb-6">مكتبتي الكاملة</h2>
        
        <!-- Books Grid -->
        <div id="libraryBooksGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
          <!-- Populated by JS -->
        </div>
      </div>

    </div>
  </main>

  <!-- PDF VIEWER MODAL -->
  <div id="pdfModal" class="fixed inset-0 bg-black/90 z-50 hidden flex-col">
    <div class="h-14 bg-gray-900 flex justify-between items-center px-4 text-white">
      <h3 id="pdfTitle" class="font-bold truncate max-w-md">عرض الكتاب</h3>
      <button onclick="closeViewer()" class="bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded-lg font-bold">إغلاق ✕</button>
    </div>
    <iframe id="pdfFrame" class="w-full flex-1 border-none bg-white"></iframe>
  </div>

<script>
  // Setup PDF.js Worker
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

  // State
  let allBooks = [];
  let isOffline = false;
  let db;

  // Init
  window.onload = async () => {
    // Check local storage for theme
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.remove('dark');
    }
    
    await openIndexedDB();
    await fetchBooks();
  };

  // --- THEME ---
  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  // --- TABS ---
  function switchTab(tab) {
    document.getElementById('tab-home').classList.add('hidden');
    document.getElementById('tab-myLibrary').classList.add('hidden');
    document.getElementById(`tab-${tab}`).classList.remove('hidden');

    // Update Sidebar Styles
    document.getElementById('btn-home').className = "w-full flex items-center gap-4 px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-ytDarkHover text-gray-700 dark:text-gray-300 font-semibold transition";
    document.getElementById('btn-library').className = "w-full flex items-center gap-4 px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-ytDarkHover text-gray-700 dark:text-gray-300 font-semibold transition";
    
    if(tab === 'home') {
      document.getElementById('btn-home').classList.add('bg-gray-200', 'dark:bg-ytDarkHover', 'text-black', 'dark:text-white');
      document.getElementById('btn-home').classList.remove('text-gray-700', 'dark:text-gray-300');
    } else {
      document.getElementById('btn-library').classList.add('bg-gray-200', 'dark:bg-ytDarkHover', 'text-black', 'dark:text-white');
      document.getElementById('btn-library').classList.remove('text-gray-700', 'dark:text-gray-300');
    }
  }

  // --- TOAST ---
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  // --- DATABASE & NETWORK ---
  async function fetchBooks() {
    try {
      // Because we are serving index.html FROM the server.js, we can just use relative URLs!
      const res = await fetch('/api/books');
      if (!res.ok) throw new Error('API down');
      allBooks = await res.json();
      
      // Update UI Status
      isOffline = false;
      document.getElementById('connStatus').innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> متصل بالخادم';
      document.getElementById('connStatus').className = "text-sm font-semibold flex items-center gap-2 text-green-500";
      
      renderBooks();
    } catch (e) {
      // Fallback to offline DB
      isOffline = true;
      document.getElementById('connStatus').innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> وضع عدم الاتصال (Offline)';
      document.getElementById('connStatus').className = "text-sm font-semibold flex items-center gap-2 text-red-500";
      showToast("⚠️ تعذر الاتصال بالخادم. سيتم استخدام متصفحك لحفظ الكتب.");
      
      allBooks = await getOfflineBooks();
      renderBooks();
    }
  }

  // --- FILE UPLOAD & PDF COVER EXTRACTION ---
  async function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    document.getElementById('loadingBox').classList.remove('hidden');
    document.getElementById('loadingText').innerText = `جاري استخراج الغلاف لكتاب: ${file.name}...`;

    try {
      const fileDataURL = await readFileAsDataURL(file);
      const coverDataURL = await extractPDFCover(fileDataURL);
      
      const newBook = {
        id: Date.now().toString(),
        name: file.name.replace('.pdf', ''),
        size: formatSize(file.size),
        date: new Date().toLocaleDateString('ar-EG'),
        cover: coverDataURL,
        pdfData: fileDataURL
      };

      document.getElementById('loadingText').innerText = "جاري الحفظ...";

      if (!isOffline) {
        // Save to Server
        const res = await fetch('/api/books', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newBook)
        });
        if (!res.ok) throw new Error("فشل الرفع للخادم");
        allBooks.push(newBook);
      } else {
        // Save to Offline IndexedDB
        await saveOfflineBook(newBook);
        allBooks.push(newBook);
      }

      renderBooks();
    } catch (err) {
      console.error(err);
      alert("حدث خطأ أثناء الرفع: " + err.message);
    }

    document.getElementById('loadingBox').classList.add('hidden');
    event.target.value = ''; // Reset input
  }

  // Read file as Base64
  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = e => reject(e);
      reader.readAsDataURL(file);
    });
  }

  // Extract page 1 of PDF as an Image (Magic happens here!)
  async function extractPDFCover(dataUrl) {
    try {
      const pdfData = atob(dataUrl.split(',')[1]);
      const loadingTask = pdfjsLib.getDocument({data: pdfData});
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);

      const scale = 1.5; // High Quality
      const viewport = page.getViewport({ scale });
      
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: context, viewport: viewport }).promise;
      return canvas.toDataURL('image/jpeg', 0.8);
    } catch (e) {
      console.warn("Could not extract cover, using default.", e);
      return "https://via.placeholder.com/300x450/0f0f0f/00e5ff?text=PDF";
    }
  }

  // --- RENDER BOOKS ---
  function renderBooks() {
    const gridHtml = allBooks.length === 0 
      ? '<div class="col-span-full text-center py-12 text-gray-500 dark:text-gray-400 font-bold text-lg">لا توجد كتب. اضغط على "➕ رفع كتاب" للبدء!</div>'
      : allBooks.map(book => `
        <div class="book-card flex flex-col group">
          <div class="relative w-full overflow-hidden rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-200 dark:bg-ytDarkCard" onclick="openViewer('${book.id}')">
            <img src="${book.cover}" class="book-thumbnail shadow-sm group-hover:shadow-md transition" alt="cover" loading="lazy">
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition"></div>
            <div class="absolute bottom-2 left-2 bg-black/80 text-white text-xs px-2 py-1 rounded font-bold backdrop-blur-sm">${book.size}</div>
          </div>
          <div class="mt-3 flex justify-between items-start gap-2">
            <div>
              <h3 class="font-bold text-sm line-clamp-2 leading-tight" title="${book.name}" onclick="openViewer('${book.id}')">${book.name}</h3>
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${book.date}</p>
            </div>
            <button onclick="deleteBook('${book.id}')" class="text-gray-400 hover:text-red-500 p-1" title="حذف الكتاب">🗑</button>
          </div>
        </div>
      `).join('');

    // Both grids reflect same items for now, just sliced differently if needed.
    document.getElementById('homeBooksGrid').innerHTML = gridHtml;
    document.getElementById('libraryBooksGrid').innerHTML = gridHtml;
  }

  // --- ACTIONS ---
  function openViewer(id) {
    const book = allBooks.find(b => b.id === id);
    if (!book) return;
    document.getElementById('pdfTitle').innerText = book.name;
    document.getElementById('pdfFrame').src = book.pdfData;
    document.getElementById('pdfModal').classList.remove('hidden');
    document.getElementById('pdfModal').classList.add('flex');
  }

  function closeViewer() {
    document.getElementById('pdfModal').classList.add('hidden');
    document.getElementById('pdfModal').classList.remove('flex');
    document.getElementById('pdfFrame').src = '';
  }

  async function deleteBook(id) {
    if(!confirm("هل أنت متأكد من حذف هذا الكتاب؟")) return;
    
    if(!isOffline) {
      await fetch('/api/books/' + id, { method: 'DELETE' });
    } else {
      await deleteOfflineBook(id);
    }
    
    allBooks = allBooks.filter(b => b.id !== id);
    renderBooks();
  }

  // --- OFFLINE INDEXEDDB LOGIC ---
  function openIndexedDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('NixuvikBooks', 1);
      request.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('books')) d.createObjectStore('books', { keyPath: 'id' });
      };
      request.onsuccess = e => { db = e.target.result; resolve(); };
      request.onerror = e => reject(e);
    });
  }

  function saveOfflineBook(book) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('books', 'readwrite');
      tx.objectStore('books').put(book);
      tx.oncomplete = () => resolve();
      tx.onerror = e => reject(e);
    });
  }

  function getOfflineBooks() {
    return new Promise((resolve, reject) => {
      if (!db) resolve([]);
      const tx = db.transaction('books', 'readonly');
      const req = tx.objectStore('books').getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = e => reject(e);
    });
  }

  function deleteOfflineBook(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction('books', 'readwrite');
      tx.objectStore('books').delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = e => reject(e);
    });
  }

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
